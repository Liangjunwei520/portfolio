<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梁俊伟 - 室内设计师作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">梁俊伟</a>
      <ul class="nav-links">
        <li><a href="#hero">首页</a></li>
        <li><a href="#about">关于</a></li>
        <li><a href="#gallery">作品</a></li>
        <li><a href="#advantages">优势</a></li>
        <li><a href="#contact">联系</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-content">
      <h1 id="hero-name"></h1>
      <p class="hero-title" id="hero-title"></p>
      <p class="hero-desc" id="hero-desc"></p>
    </div>
  </section>

  <section class="about" id="about">
    <div class="container">
      <h2 class="section-title">关于我</h2>
      <div class="about-grid">
        <div class="about-text">
          <p id="about-intro"></p>
        </div>
        <div class="about-stats" id="about-stats"></div>
      </div>
      <div class="contact-info" id="contact-info"></div>
    </div>
  </section>

  <section class="gallery" id="gallery">
    <div class="container">
      <h2 class="section-title">精选项目</h2>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </section>

  <section class="advantages" id="advantages">
    <div class="container">
      <h2 class="section-title">核心优势</h2>
      <div class="advantage-grid" id="advantage-grid"></div>
    </div>
  </section>

  <section class="contact" id="contact">
    <div class="container">
      <h2 class="section-title">联系我</h2>
      <div class="contact-cards" id="contact-cards"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; <span id="footer-year"></span> 梁俊伟设计工作室. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
